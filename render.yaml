databases:
  - name: admin-db
    plan: free

services:
  - type: web
    name: admin-dashboard
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: admin-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: admin-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: admin-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: admin-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: admin-db
          property: password