spring:
  datasource:
    url: jdbc:h2:mem:admindb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

app:
  jwt:
    secret: AdminSecretKey2024AdminSecretKey2024AdminSecretKey2024AdminSecretKey2024
    expiration: 86400000  # 24 hours

server:
  port: ${PORT:8080}

logging:
  level:
    com.admin: DEBUG
    org.springframework.security: INFO
